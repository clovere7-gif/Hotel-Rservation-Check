<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }
h1 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
.upload-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.upload-box { background: #fff; border: 1.5px dashed #ccc; border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; }
.upload-box:hover { border-color: #888; }
.upload-box.loaded { border: 1.5px solid #1a7a42; background: #e8f7ee; }
.upload-icon { font-size: 24px; margin-bottom: 6px; }
.upload-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; }
.upload-box.loaded .upload-label { color: #1a7a42; }
.upload-status { font-size: 11px; color: #aaa; }
.upload-box.loaded .upload-status { color: #1a7a42; }
input[type=file] { display: none; }
.mapper { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 16px; margin-bottom: 14px; display: none; }
.mapper h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #555; }
.mapper-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.mapper-group h4 { font-size: 11px; color: #888; margin-bottom: 8px; font-weight: 600; border-bottom: 1px solid #eee; padding-bottom: 4px; }
.map-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.map-row label { font-size: 11px; color: #555; width: 80px; flex-shrink: 0; }
.map-row select { flex: 1; padding: 4px 6px; border: 1px solid #ddd; border-radius: 6px; font-size: 11px; background: #fff; }
.action-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.search-input { flex: 1; min-width: 180px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; outline: none; }
button { padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; }
button:hover { background: #f0f0f0; }
button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
button.primary:hover { background: #333; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
.stat { background: #fff; border-radius: 10px; padding: 12px 16px; border: 1px solid #e8e8e8; }
.stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 600; color: #1a1a1a; }
.stat-val.red { color: #d00; }
.stat-val.green { color: #1a7a42; }
.table-wrap { overflow-x: auto; background: #fff; border-radius: 10px; border: 1px solid #e8e8e8; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
th { background: #f8f8f8; color: #666; font-weight: 500; padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 12px; white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; color: #1a1a1a; vertical-align: middle; font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr.err-row td { background: #fff8f8; }
tr:hover td { background: #fafafa; }
tr.err-row:hover td { background: #fff0f0; }
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.badge.ok { background: #e8f7ee; color: #1a7a42; }
.badge.err { background: #ffe0e0; color: #c00; }
.badge.warn { background: #fff8e0; color: #a06000; }
.diff-neg { color: #d00; font-size: 12px; font-weight: 500; }
.empty { text-align: center; padding: 40px; color: #aaa; }
.guide { text-align: center; padding: 40px; color: #aaa; line-height: 2; }
</style>
</head>
<body>
<div class="container">
  <h1>🏨 호텔 예약 오류 확인 시스템</h1>
  <div class="upload-section">
    <div class="upload-box" id="box-ota" onclick="document.getElementById('file-ota').click()">
      <div class="upload-icon">📄</div>
      <div class="upload-label">OTA 예약 파일</div>
      <div class="upload-status" id="status-ota">클릭하여 업로드</div>
      <input type="file" id="file-ota" accept=".xlsx,.xls,.csv" onchange="loadFile('ota',this)">
    </div>
    <div class="upload-box" id="box-pms" onclick="document.getElementById('file-pms').click()">
      <div class="upload-icon">📄</div>
      <div class="upload-label">PMS(윙스) 파일</div>
      <div class="upload-status" id="status-pms">클릭하여 업로드</div>
      <input type="file" id="file-pms" accept=".xlsx,.xls,.csv" onchange="loadFile('pms',this)">
    </div>
    <div class="upload-box" id="box-master" onclick="document.getElementById('file-master').click()">
      <div class="upload-icon">📄</div>
      <div class="upload-label">고마스터 파일</div>
      <div class="upload-status" id="status-master">클릭하여 업로드</div>
      <input type="file" id="file-master" accept=".xlsx,.xls,.csv" onchange="loadFile('master',this)">
    </div>
  </div>

  <div class="mapper" id="mapper">
    <h3>⚙️ 확인목록 — 각 파일에서 해당하는 항목을 선택해 주세요</h3>
    <div class="mapper-grid">
      <div class="mapper-group">
        <h4>OTA 파일</h4>
        <div class="map-row"><label>OTA 예약번호</label><select id="ota-id"></select></div>
        <div class="map-row"><label>고객명</label><select id="ota-name"></select></div>
        <div class="map-row"><label>체크인</label><select id="ota-ci"></select></div>
        <div class="map-row"><label>체크아웃</label><select id="ota-co"></select></div>
        <div class="map-row"><label>판매가</label><select id="ota-sell"></select></div>
        <div class="map-row"><label>입금가</label><select id="ota-recv"></select></div>
        <div class="map-row"><label>객실타입</label><select id="ota-roomtype"></select></div>
        <div class="map-row"><label>객실수</label><select id="ota-roomcnt"></select></div>
      </div>
      <div class="mapper-group">
        <h4>PMS 파일</h4>
        <div class="map-row"><label>OTA 예약번호</label><select id="pms-otaid"></select></div>
        <div class="map-row"><label>PMS 예약번호</label><select id="pms-id"></select></div>
        <div class="map-row"><label>고객명</label><select id="pms-name"></select></div>
        <div class="map-row"><label>체크인</label><select id="pms-ci"></select></div>
        <div class="map-row"><label>체크아웃</label><select id="pms-co"></select></div>
        <div class="map-row"><label>판매가</label><select id="pms-sell"></select></div>
        <div class="map-row"><label>객실타입</label><select id="pms-roomtype"></select></div>
        <div class="map-row"><label>객실수</label><select id="pms-roomcnt"></select></div>
      </div>
      <div class="mapper-group">
        <h4>고마스터 파일</h4>
        <div class="map-row"><label>OTA 예약번호</label><select id="master-otaid"></select></div>
        <div class="map-row"><label>PMS 예약번호</label><select id="master-pmsid"></select></div>
        <div class="map-row"><label>고객명</label><select id="master-name"></select></div>
        <div class="map-row"><label>체크인</label><select id="master-ci"></select></div>
        <div class="map-row"><label>체크아웃</label><select id="master-co"></select></div>
        <div class="map-row"><label>판매가</label><select id="master-sell"></select></div>
        <div class="map-row"><label>입금가</label><select id="master-recv"></select></div>
        <div class="map-row"><label>객실타입</label><select id="master-roomtype"></select></div>
        <div class="map-row"><label>객실수</label><select id="master-roomcnt"></select></div>
      </div>
    </div>
    <div style="margin-top:12px; text-align:right;">
      <button class="primary" onclick="compare()">🔍 비교 시작</button>
    </div>
  </div>

  <div class="action-bar" id="actionBar" style="display:none">
    <input type="text" class="search-input" id="searchInput" placeholder="예약번호, 고객명 검색..." oninput="renderTable()">
    <button onclick="clearSearch()">초기화</button>
  </div>
  <div class="stats" id="statsBar" style="display:none">
    <div class="stat"><div class="stat-label">전체 검사</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">정상</div><div class="stat-val green" id="s-ok">0</div></div>
    <div class="stat"><div class="stat-label">오류</div><div class="stat-val red" id="s-err">0</div></div>
    <div class="stat"><div class="stat-label">차액 합계</div><div class="stat-val red" id="s-diff">-</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>OTA 예약번호</th>
          <th>PMS 예약번호</th>
          <th>고객명</th>
          <th>체크인</th>
          <th>체크아웃</th>
          <th>객실수</th>
          <th>판매가</th>
          <th>입금가</th>
          <th>오류 내용</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="9" class="guide">📂 위에서 파일 3개를 업로드하면 자동으로 비교됩니다.</td></tr>
      </tbody>
    </table>
  </div>
</div>
<script>
const files = { ota: null, pms: null, master: null };
let results = [];

const masterHints = { 'master-otaid':'주문번호','master-pmsid':'예약확정번호','master-name':'성명','master-ci':'체크인','master-co':'체크아웃','master-sell':'실결제금액','master-recv':'시설입금가','master-roomtype':'객실명','master-roomcnt':'객실수' };
const pmsHints = { 'pms-otaid':'OTA번호','pms-id':'예약번호','pms-name':'고객명','pms-ci':'입실일자','pms-co':'퇴실일자','pms-sell':'총금액','pms-roomtype':'객실타입','pms-roomcnt':'객실수' };
const otaHints = { 'ota-id':'예약번호','ota-name':'예약자','ota-ci':'입실','ota-co':'퇴실','ota-sell':'판매금액','ota-recv':'입금가','ota-roomtype':'객실','ota-roomcnt':'객실수' };

function loadFile(type, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type:'array', cellDates:true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, { defval:'' });
      files[type] = { data:json, cols:Object.keys(json[0]||{}) };
      document.getElementById('box-'+type).classList.add('loaded');
      document.getElementById('status-'+type).textContent = `✓ ${file.name} (${json.length}행)`;
      updateMapper();
    } catch(e) {
      document.getElementById('status-'+type).textContent = '❌ 읽기 실패';
    }
  };
  reader.readAsArrayBuffer(file);
}

function populateSelect(id, cols, hint) {
  const sel = document.getElementById(id);
  const matched = hint ? (cols.find(c=>c.includes(hint))||'') : '';
  sel.innerHTML = '<option value="">-- 선택 --</option>' + cols.map(c=>`<option value="${c}"${c===matched?' selected':''}>${c}</option>`).join('');
}

function updateMapper() {
  if (!Object.values(files).some(Boolean)) return;
  document.getElementById('mapper').style.display = 'block';
  if (files.ota) Object.entries(otaHints).forEach(([id,h])=>populateSelect(id,files.ota.cols,h));
  if (files.pms) Object.entries(pmsHints).forEach(([id,h])=>populateSelect(id,files.pms.cols,h));
  if (files.master) Object.entries(masterHints).forEach(([id,h])=>populateSelect(id,files.master.cols,h));
}

const g = id => document.getElementById(id).value;
const toNum = v => { const n=parseFloat(String(v).replace(/[^0-9.-]/g,'')); return isNaN(n)?0:n; };
const fmtDate = v => { if(!v) return '-'; if(v instanceof Date) return v.toLocaleDateString('ko-KR'); return String(v).slice(0,10); };
const won = n => n ? n.toLocaleString('ko-KR')+'원' : '-';

function compare() {
  results = [];

  // 인덱스 생성
  const pmsByOta = {}, pmsByPms = {};
  if (files.pms) files.pms.data.forEach(r => {
    const k = String(r[g('pms-otaid')]||'').trim();
    const k2 = String(r[g('pms-id')]||'').trim();
    if (k) pmsByOta[k] = r;
    if (k2) pmsByPms[k2] = r;
  });
  const masterByOta = {}, masterByPms = {};
  if (files.master) files.master.data.forEach(r => {
    const k = String(r[g('master-otaid')]||'').trim();
    const k2 = String(r[g('master-pmsid')]||'').trim();
    if (k) masterByOta[k] = r;
    if (k2) masterByPms[k2] = r;
  });
  const otaById = {};
  if (files.ota) files.ota.data.forEach(r => {
    const k = String(r[g('ota-id')]||'').trim();
    if (k) otaById[k] = r;
  });

  const added = new Set();

  // 1. OTA 기준 루프
  if (files.ota) {
    files.ota.data.forEach(r => {
      const otaId = String(r[g('ota-id')]||'').trim();
      const pms = pmsByOta[otaId]||null;
      const master = masterByOta[otaId]||null;
      const errors = [];

      const otaSell = toNum(r[g('ota-sell')]);
      const otaRecv = toNum(r[g('ota-recv')]);
      const pmsSell = pms ? toNum(pms[g('pms-sell')]) : null;
      const masterSell = master ? toNum(master[g('master-sell')]) : null;
      const masterRecv = master ? toNum(master[g('master-recv')]) : null;

      if (!pms) errors.push('PMS 누락');
      if (!master) errors.push('고마스터 누락');
      if (masterSell !== null && pmsSell !== null && masterSell !== pmsSell) errors.push(`판매가 불일치(고마↔PMS) ▼${won(Math.abs(masterSell-pmsSell))}`);
      if (masterSell !== null && otaSell && masterSell !== otaSell) errors.push(`판매가 불일치(고마↔OTA) ▼${won(Math.abs(masterSell-otaSell))}`);
      if (masterRecv !== null && otaRecv && masterRecv !== otaRecv) errors.push(`입금가 불일치(고마↔OTA) ▼${won(Math.abs(masterRecv-otaRecv))}`);

      const pmsId = pms ? String(pms[g('pms-id')]||'-') : '-';
      const name = master ? String(master[g('master-name')]||'-') : String(r[g('ota-name')]||'-');
      const ci = master ? fmtDate(master[g('master-ci')]) : fmtDate(r[g('ota-ci')]);
      const co = master ? fmtDate(master[g('master-co')]) : fmtDate(r[g('ota-co')]);
      const roomcnt = master ? String(master[g('master-roomcnt')]||'-') : String(r[g('ota-roomcnt')]||'-');
      const sell = masterSell||otaSell;
      const recv = masterRecv||otaRecv;

      results.push({ otaId, pmsId, name, ci, co, roomcnt, sell, recv, errors });
      added.add('ota:'+otaId);
    });
  }

  // 2. PMS 기준 루프 — OTA/고마스터에 없는 것
  if (files.pms) {
    files.pms.data.forEach(r => {
      const otaId = String(r[g('pms-otaid')]||'').trim();
      const pmsId = String(r[g('pms-id')]||'').trim();
      if (added.has('ota:'+otaId)) return;
      const master = masterByOta[otaId]||masterByPms[pmsId]||null;
      const errors = [];
      if (!otaById[otaId]) errors.push('OTA 누락');
      if (!master) errors.push('고마스터 누락');
      const name = String(r[g('pms-name')]||'-');
      const ci = fmtDate(r[g('pms-ci')]);
      const co = fmtDate(r[g('pms-co')]);
      const roomcnt = String(r[g('pms-roomcnt')]||'-');
      const sell = toNum(r[g('pms-sell')]);
      results.push({ otaId:otaId||'-', pmsId, name, ci, co, roomcnt, sell, recv:0, errors });
      added.add('pms:'+pmsId);
    });
  }

  // 3. 고마스터 기준 루프 — OTA/PMS에 없는 것
  if (files.master) {
    files.master.data.forEach(r => {
      const otaId = String(r[g('master-otaid')]||'').trim();
      const pmsId = String(r[g('master-pmsid')]||'').trim();
      if (added.has('ota:'+otaId)||added.has('pms:'+pmsId)) return;
      const errors = [];
      if (!otaById[otaId]) errors.push('OTA 누락');
      if (!pmsById(pmsId)) errors.push('PMS 누락');
      const name = String(r[g('master-name')]||'-');
      const ci = fmtDate(r[g('master-ci')]);
      const co = fmtDate(r[g('master-co')]);
      const roomcnt = String(r[g('master-roomcnt')]||'-');
      const sell = toNum(r[g('master-sell')]);
      const recv = toNum(r[g('master-recv')]);
      results.push({ otaId:otaId||'-', pmsId:pmsId||'-', name, ci, co, roomcnt, sell, recv, errors });
    });
  }

  document.getElementById('actionBar').style.display = 'flex';
  document.getElementById('statsBar').style.display = 'grid';
  updateStats();
  renderTable();
}

function pmsById(id) {
  if (!files.pms) return null;
  return files.pms.data.find(r => String(r[g('pms-id')]||'').trim() === id)||null;
}

function updateStats() {
  const errs = results.filter(r=>r.errors.length>0);
  const diffSum = errs.reduce((s,r)=>s+Math.abs(r.sell-(r.recv||0)),0);
  document.getElementById('s-total').textContent = results.length;
  document.getElementById('s-ok').textContent = results.length-errs.length;
  document.getElementById('s-err').textContent = errs.length;
  document.getElementById('s-diff').textContent = diffSum ? won(diffSum) : '-';
}

function renderTable() {
  const q = (document.getElementById('searchInput').value||'').trim().toLowerCase();
  const filtered = results.filter(r => {
    const match = !q || r.otaId.toLowerCase().includes(q) || r.pmsId.toLowerCase().includes(q) || r.name.includes(q);
    return match && r.errors.length > 0;
  });
  const tbody = document.getElementById('tbody');
  if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="9" class="empty">오류 없음</td></tr>'; return; }
  tbody.innerHTML = filtered.map(r => `<tr class="err-row">
    <td><b>${r.otaId}</b></td>
    <td>${r.pmsId}</td>
    <td>${r.name}</td>
    <td>${r.ci}</td>
    <td>${r.co}</td>
    <td>${r.roomcnt}</td>
    <td>${won(r.sell)}</td>
    <td>${r.recv ? won(r.recv) : '-'}</td>
    <td>${r.errors.map(e=>`<span class="badge err">${e}</span>`).join(' ')}</td>
  </tr>`).join('');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  renderTable();
}
</script>
</body>
</html>
